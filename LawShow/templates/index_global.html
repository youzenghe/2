<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合同知识图谱全局视图</title>
    <link href="../static/style.css" rel="stylesheet" type="text/css"/>
    <script src="https://d3js.org/d3.v3.min.js" charset="utf-8"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

</head>
<body>
<button class="toggle-btn" onclick="toggleSidebar()">&#9776;</button>

<aside class="sidebar" id="sidebar">
    <div class="container">
        <button class="button" onclick="jumpToURL()">返回主页</button>
    </div>
</aside>

<div class="main-content">
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>
    <div id="graph-container"></div>
</div>

<script>
    function showLoading() {
        document.getElementById('loading').style.display = 'flex';
    }

    function hideLoading() {
        document.getElementById('loading').style.display = 'none';
    }

    function jumpToURL() {
        window.location.href = "http://127.0.0.1:8000";
    }

    function startIni() {
        showLoading();

        var margin = {top: 20, right: 120, bottom: 20, left: 120},
            width = window.innerWidth - margin.right - margin.left,
            height = window.innerHeight - margin.top - margin.bottom - 20;

        var i = 0,
            duration = 750,
            root;

        var tree = d3.layout.tree()
            .size([height, width]);

        var diagonal = d3.svg.diagonal()
            .projection(function(d) {
                return [d.y, d.x];
            });

        var svg = d3.select("#graph-container").append("svg")
            .attr("width", width + margin.right + margin.left)
            .attr("height", height + margin.top + margin.bottom)
            .append("g")
            .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

        var tooltip = d3.select("body").append("div")
            .attr("class", "tooltip")
            .style("opacity", 0);

        d3.json("data.json", function(error, flare) {
            if (error) {
                hideLoading();
                alert("加载数据失败，请刷新重试");
                throw error;
            }

            root = flare;
            root.x0 = height / 2;
            root.y0 = 0;

            function collapse(d) {
                if (d.children) {
                    d._children = d.children;
                    d._children.forEach(collapse);
                    d.children = null;
                }
            }

            root.children.forEach(collapse);
            update(root);
            hideLoading();
        });

        function update(source) {
            var nodes = tree.nodes(root).reverse(),
                links = tree.links(nodes);

            nodes.forEach(function(d) {
                if (d.depth == 0) {
                    d.y = 0;
                } else if (d._children == null && d.children == null) {
                    d.y = d.depth * 200 + 100;
                } else {
                    d.y = d.depth * 200 + 200;
                }
            });

            var node = svg.selectAll("g.node")
                .data(nodes, function(d) {
                    return d.id || (d.id = ++i);
                });

            var nodeEnter = node.enter().append("g")
                .attr("class", "node")
                .attr("transform", function(d) {
                    return "translate(" + source.y0 + "," + source.x0 + ")";
                })
                .on("click", click)
                .on("mouseover", mouseover)
                .on("mouseout", mouseout);

            nodeEnter.append("circle")
                .attr("r", 1e-6)
                .style("fill", function(d) {
                    return d._children ? "#f0ead6" : (d.children ? "#fff" : "#4a90e2");
                })
                .style("stroke", function(d) {
                    return d._children ? "#d4c9a1" : (d.children ? "#4a90e2" : "#2c7be5");
                });

            nodeEnter.append("text")
                .attr("x", function(d) {
                    return d.children || d._children ? -10 : 10;
                })
                .attr("dy", ".35em")
                .attr("text-anchor", function(d) {
                    return d.children || d._children ? "end" : "start";
                })
                .text(function(d) {
                    return d.name;
                })
                .style("fill-opacity", 1e-6);

            var nodeUpdate = node.transition()
                .duration(duration)
                .attr("transform", function(d) {
                    return "translate(" + d.y + "," + d.x + ")";
                });

            nodeUpdate.select("circle")
                .attr("r", 6)
                .style("fill", function(d) {
                    return d._children ? "#f0ead6" : (d.children ? "#fff" : "#4a90e2");
                })
                .style("stroke-width", function(d) {
                    return d._children || d.children ? "2px" : "1px";
                });

            nodeUpdate.select("text")
                .style("fill-opacity", 1)
                .style("font-weight", function(d) {
                    return d.depth === 0 ? "bold" : "normal";
                });

            var nodeExit = node.exit().transition()
                .duration(duration)
                .attr("transform", function(d) {
                    return "translate(" + source.y + "," + source.x + ")";
                })
                .remove();

            nodeExit.select("circle")
                .attr("r", 1e-6);

            nodeExit.select("text")
                .style("fill-opacity", 1e-6);

            var link = svg.selectAll("path.link")
                .data(links, function(d) {
                    return d.target.id;
                });

            link.enter().insert("path", "g")
                .attr("class", "link")
                .attr("d", function(d) {
                    var o = {x: source.x0, y: source.y0};
                    return diagonal({source: o, target: o});
                });

            link.transition()
                .duration(duration)
                .attr("d", diagonal);

            link.exit().transition()
                .duration(duration)
                .attr("d", function(d) {
                    var o = {x: source.x, y: source.y};
                    return diagonal({source: o, target: o});
                })
                .remove();

            nodes.forEach(function(d) {
                d.x0 = d.x;
                d.y0 = d.y;
            });
        }

        function click(d) {
            if (d.children) {
                d._children = d.children;
                d.children = null;
            } else {
                d.children = d._children;
                d._children = null;
            }
            update(d);
        }

        function mouseover(d) {
            if (d._children == null && d.children == null && d.lines) {
                tooltip.html(d.lines)
                    .style("left", (d3.event.pageX + 10) + "px")
                    .style("top", (d3.event.pageY + 10) + "px")
                    .style("opacity", 1);
            }

            d3.select(this).select("circle")
                .style("stroke-width", "3px")
                .style("stroke", "#2c7be5");
        }

        function mouseout(d) {
            tooltip.style("opacity", 0);

            d3.select(this).select("circle")
                .style("stroke-width", function(d) {
                    return d._children || d.children ? "2px" : "1px";
                })
                .style("stroke", function(d) {
                    return d._children ? "#d4c9a1" : (d.children ? "#4a90e2" : "#2c7be5");
                });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('visible');

            var isCollapsed = document.getElementById('sidebar').classList.contains('visible');
            var newWidth = isCollapsed ?
                window.innerWidth - margin.right - margin.left - 20 :
                window.innerWidth - margin.right - margin.left - 300;

            d3.select("svg")
                .attr("width", newWidth + margin.right + margin.left);
        }

        window.addEventListener('resize', function() {
            var isCollapsed = document.getElementById('sidebar').classList.contains('visible');
            var newWidth = isCollapsed ?
                window.innerWidth - margin.right - margin.left - 20 :
                window.innerWidth - margin.right - margin.left - 300;
            var newHeight = window.innerHeight - margin.top - margin.bottom - 20;

            tree.size([newHeight, newWidth]);

            d3.select("svg")
                .attr("width", newWidth + margin.right + margin.left)
                .attr("height", newHeight + margin.top + margin.bottom);

            if (root) update(root);
        });
    }

    startIni();
</script>
</body>
</html>
