<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑模板 - 智能模板管理系统</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #4361ee;
      --secondary: #3a0ca3;
      --accent: #f72585;
      --success: #4cc9f0;
      --dark: #1a1a2e;
      --light: #f8f9fa;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--dark);
      color: var(--light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
      color: var(--light);
      text-align: center;
    }

    .filename {
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 15px;
      text-align: center;
      font-size: 1.1rem;
    }

    textarea {
      width: 100%;
      min-height: 500px;
      padding: 15px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.3);
      color: var(--light);
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-family: 'Courier New', Courier, monospace;
      line-height: 1.5;
      resize: vertical;
      margin-bottom: 20px;
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button i {
      margin-right: 8px;
    }

    .cancel {
      background: var(--accent);
    }

    .save {
      background: var(--primary);
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    @media (max-width: 768px) {
      .actions {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>编辑模板</h1>
  <div class="filename">{{ filename }}</div>

  <form method="post">
    <textarea name="content">{{ content }}</textarea>
    <div class="actions">
      <button type="button" class="cancel" onclick="window.history.back()">
        <i class="fas fa-times"></i> 取消
      </button>
      <button type="submit" class="save">
        <i class="fas fa-save"></i> 保存
      </button>
    </div>
  </form>
</div>
</body>
</html>
