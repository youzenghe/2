<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智审云枢 | 提交失败</title>
    <style>
        :root {
            --accent-blue: #2563eb;
            --deep-navy: #1e3e7e;
            --bg-body: #f4f7fa;
            --bg-card: #ffffff;
            --border: #e2e8f0;
            --text-main: #334155;
            --text-sub: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-body);
            font-family: "Microsoft YaHei", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--text-main);
        }

        .error-card {
            width: min(640px, 100%);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
            text-align: center;
        }

        .error-icon {
            font-size: 3rem;
            margin-bottom: 18px;
        }

        h1 {
            color: var(--deep-navy);
            font-size: 2rem;
            margin-bottom: 14px;
        }

        .message {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            line-height: 1.8;
            color: var(--text-main);
            margin-bottom: 24px;
            word-break: break-word;
        }

        .tip {
            color: var(--text-sub);
            margin-bottom: 24px;
            line-height: 1.7;
        }

        button {
            border: none;
            border-radius: 999px;
            padding: 12px 26px;
            background: linear-gradient(135deg, var(--accent-blue), var(--deep-navy));
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.24);
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">⚠️</div>
        <h1>提交失败</h1>
        <div class="message">{{ message or '请求处理失败，请检查输入信息后重试。' }}</div>
        <div class="tip">如果问题持续出现，建议返回上一页重新填写或检查后端服务状态。</div>
        <button onclick="window.location.href='/'">返回表单</button>
    </div>
</body>
</html>
