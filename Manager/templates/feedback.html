<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智审云枢 | 合同模板反馈管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    :root { --blue:#2563eb; --navy:#1e3e7e; --border:#e2e8f0; --text:#334155; --bg:#f5f9ff; }
    body { font-family:"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .navbar-top,.nav-right,.user-tag,.home-btn,.logout-box,.content-card,.filter-bar,.table-container,.modal-container { all: revert; }
    .navbar-top{display:flex;justify-content:space-between;align-items:center;padding:16px 5% 8px}.nav-brand{font-weight:900;color:var(--blue);font-size:1.55rem}.nav-right{display:flex;align-items:center;gap:20px}.user-tag{font-weight:700;color:var(--blue)}
    .home-btn,.logout-box{border:1.5px solid var(--blue);border-radius:8px;padding:6px 16px;text-decoration:none;color:var(--blue);background:#fff;display:flex;align-items:center;gap:6px;transition:.2s}.home-btn:hover,.logout-box:hover{background:var(--blue);color:#fff}
    .main-wrapper{max-width:1400px;margin:8px auto 40px;padding:0 20px}.content-card{background:#fff;border-radius:20px;border:1px solid var(--border);padding:36px;box-shadow:0 10px 40px rgba(0,0,0,.04)}
    .title-group{text-align:center;margin-bottom:32px}.title-group h1{font-size:2.4rem;font-weight:900;color:var(--blue);margin-bottom:8px}.title-deco{color:#94a3b8;letter-spacing:2px;font-size:.98rem}
    .filter-bar{background:#f8fafc;border-radius:12px;padding:20px;margin-bottom:26px;display:flex;gap:15px;align-items:flex-end;flex-wrap:wrap}.filter-item{flex:1;min-width:160px}.form-control,.form-select{border-radius:8px;height:42px;border:1.5px solid var(--border)}
    .btn-search{height:42px;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:0 24px;font-weight:700}.table-container{border-radius:12px;overflow-x:auto;border:1px solid #f1f5f9}.custom-thead{background:#f0f7ff}.custom-thead th{padding:18px 12px!important;text-align:center;color:var(--blue);font-weight:800;border:none}
    .table tbody td{padding:16px 12px;text-align:center;vertical-align:middle;border-bottom:1px solid #f1f5f9}.feedback-content-preview{max-width:300px;white-space:normal;word-break:break-word;text-align:left}.badge-status{font-size:.8rem;padding:5px 14px;border-radius:20px;font-weight:700}.badge-pending{background:#fef3c7;color:#d97706}.badge-done{background:#d1fae5;color:#059669}
    .btn-reply{padding:6px 20px;border-radius:8px;font-size:.9rem;background:transparent;border:1.5px solid #93c5fd;color:var(--blue);font-weight:600;cursor:pointer}.btn-reply:hover{background:var(--blue);color:#fff}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;visibility:hidden;transition:.2s}.modal-overlay.active{opacity:1;visibility:visible}.modal-container{background:#fff;border-radius:20px;width:90%;max-width:500px;padding:30px;box-shadow:0 20px 40px rgba(0,0,0,.2);transform:scale(.92);transition:.2s}.modal-overlay.active .modal-container{transform:scale(1)}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:15px;border-bottom:2px solid var(--border)}.modal-close{background:none;border:none;font-size:24px;color:#94a3b8;cursor:pointer}.modal-body textarea{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:12px;min-height:120px}.modal-footer{display:flex;justify-content:flex-end;gap:12px;margin-top:20px}.btn-cancel{background:#f1f5f9;color:var(--text)}.btn-confirm{background:var(--blue);color:#fff}.modal-footer button{padding:10px 24px;border-radius:8px;border:none;cursor:pointer;font-weight:600}
  </style>
</head>
<body>
<header class="navbar-top">
  <div class="nav-brand"><i class="bi bi-scales"></i> 反馈管理中心</div>
  <div class="nav-right">
    <div class="user-tag"><i class="bi bi-person-circle"></i> 管理员</div>
    <a href="http://127.0.0.1:8003/model" class="home-btn"><i class="bi bi-house-door"></i> 首页</a>
    <a href="#" class="logout-box" onclick="logout()"><i class="bi bi-box-arrow-right"></i> 退出系统</a>
  </div>
</header>
<main class="main-wrapper">
  <div class="content-card">
    <section class="title-group"><h1>合同模板反馈管理</h1><div class="title-deco">FEEDBACK MANAGEMENT | CONTRACT REVIEW</div></section>
    <div class="filter-bar">
      <div class="filter-item"><label class="form-label small fw-bold text-muted">关键词查询</label><input type="text" class="form-control shadow-none" id="searchKeyword" placeholder="搜索模板名、提交人或反馈内容..."></div>
      <div class="filter-item"><label class="form-label small fw-bold text-muted">处理状态</label><select class="form-select shadow-none" id="searchStatus"><option value="全部">全部状态</option><option value="待处理">待处理</option><option value="已处理">已处理</option></select></div>
      <button class="btn-search" onclick="doSearch()">查询记录</button>
    </div>
    <div class="table-container"><table class="table align-middle m-0"><thead class="custom-thead"><tr><th>ID</th><th>合同模板</th><th>反馈内容</th><th>提交人</th><th>提交时间</th><th>状态</th><th>操作</th></tr></thead><tbody id="feedbackBody"><tr><td colspan="7" class="text-center py-4">加载中...</td></tr></tbody></table></div>
  </div>
</main>
<div id="replyModal" class="modal-overlay"><div class="modal-container"><div class="modal-header"><h3><i class="bi bi-chat-dots"></i> 回复反馈</h3><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body"><label class="fw-bold mb-2">回复内容：</label><textarea id="replyContent" placeholder="请输入回复内容..."></textarea></div><div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">取消</button><button class="btn-confirm" onclick="submitReply()">确认回复</button></div></div></div>
<script>
let rawData=[];let currentFeedbackId=null;
async function fetchRealData(){try{const res=await fetch('/api/feedback');const result=await res.json();if(result.code===200){rawData=result.data;renderTable(rawData);}else{document.getElementById('feedbackBody').innerHTML='<tr><td colspan="7" class="text-center py-4 text-danger">加载失败: '+(result.message||'未知错误')+'</td></tr>';}}catch(e){console.error(e);document.getElementById('feedbackBody').innerHTML='<tr><td colspan="7" class="text-center py-4 text-danger">网络错误，请检查服务是否正常运行。</td></tr>';}}
function renderTable(dataList){const tbody=document.getElementById('feedbackBody');if(!dataList.length){tbody.innerHTML='<tr><td colspan="7" class="text-center py-4 text-muted">暂无反馈数据</td></tr>';return;}tbody.innerHTML=dataList.map(item=>{const statusText=item.status==='已处理'?'已处理':'待处理';const badgeClass=statusText==='已处理'?'badge-done':'badge-pending';const isProcessed=statusText==='已处理';const displayContent=item.original_content||(item.content?item.content.split('|')[0]:'');return `<tr><td class="text-muted">#${item.id}</td><td class="fw-bold text-dark">${escapeHtml(item.template_name||'')}</td><td class="feedback-content-preview">${escapeHtml(displayContent.substring(0,100))}${displayContent.length>100?'...':''}</td><td>${escapeHtml(item.submitter||'')}</td><td class="small text-secondary">${item.created_at||''}</td><td><span class="badge-status ${badgeClass}">${statusText}</span></td><td>${!isProcessed?`<button class="btn-reply" onclick="openReplyModal(${item.id})">回复处理</button>`:'<span class="text-muted">已处理</span>'}</td></tr>`;}).join('');}
function escapeHtml(str){if(!str) return '';return str.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');}
function doSearch(){const kw=document.getElementById('searchKeyword').value.trim().toLowerCase();const st=document.getElementById('searchStatus').value;const filtered=rawData.filter(item=>{const tName=(item.template_name||'').toLowerCase();const user=(item.submitter||'').toLowerCase();const content=((item.original_content||item.content)||'').toLowerCase();const matchKw=tName.includes(kw)||user.includes(kw)||content.includes(kw);const matchSt=(st==='全部'||item.status===st);return matchKw&&matchSt;});renderTable(filtered);}
function openReplyModal(id){currentFeedbackId=id;document.getElementById('replyContent').value='';document.getElementById('replyModal').classList.add('active');}
function closeModal(){document.getElementById('replyModal').classList.remove('active');currentFeedbackId=null;}
async function submitReply(){const replyContent=document.getElementById('replyContent').value.trim();if(!replyContent){alert('请输入回复内容。');return;}const confirmBtn=document.querySelector('#replyModal .btn-confirm');const originalText=confirmBtn.innerHTML;confirmBtn.innerHTML='提交中...';confirmBtn.disabled=true;try{const formData=new FormData();formData.append('reply_content',replyContent);const response=await fetch(`/api/feedback/${currentFeedbackId}/reply`,{method:'POST',body:formData});const result=await response.json();if(result.code===200){alert('回复成功。');closeModal();fetchRealData();}else{alert('回复失败: '+(result.message||'未知错误'));}}catch(error){console.error(error);alert('网络错误，请重试。');}finally{confirmBtn.innerHTML=originalText;confirmBtn.disabled=false;}}
function logout(){if(confirm('是否退出系统？')){window.location.href='http://127.0.0.1:5011/';}}
document.getElementById('replyModal').addEventListener('click',function(e){if(e.target===this) closeModal();});window.onload=fetchRealData;
</script>
</body>
</html>
