<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智审云枢 | 管理中枢</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --blue: #2563eb;
      --navy: #1e3e7e;
      --bg-top: #8bbcff;
      --bg-bottom: #4f87f7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", "PingFang SC", sans-serif;
      background: linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .wave { position: fixed; width: 200vw; height: 200vw; border-radius: 43%; background: rgba(255,255,255,.08); bottom: -150vw; left: -50vw; animation: spin 30s linear infinite; }
    .wave.two { background: rgba(255,255,255,.05); bottom: -145vw; left: -30vw; animation-direction: reverse; animation-duration: 40s; }
    @keyframes spin { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
    .card {
      width: 920px; background: rgba(255,255,255,.97); border-radius: 24px; padding: 56px 50px; box-shadow: 0 30px 60px rgba(0,0,0,.12); position: relative;
    }
    .card::before { content:""; position:absolute; top:24px; left:24px; width:30px; height:30px; border-top:3px solid var(--blue); border-left:3px solid var(--blue); opacity:.5; }
    .title { text-align:center; margin-bottom: 48px; }
    .title h1 { font-size: 3rem; color: var(--blue); letter-spacing: 10px; margin-bottom: 12px; }
    .status { display:flex; justify-content:center; align-items:center; gap:12px; color: var(--navy); font-size:.85rem; letter-spacing: 2px; opacity:.75; }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--blue); box-shadow: 0 0 10px var(--blue); }
    .grid { display:grid; grid-template-columns: repeat(2,1fr); gap:22px; }
    .item {
      display:flex; align-items:center; gap:18px; text-decoration:none; background:#f8fbff; border:1px solid #edf2f7; border-left:6px solid var(--blue); border-radius:14px; padding:28px 24px; transition:.25s;
    }
    .item:hover { transform: translateY(-4px); background:#fff; box-shadow: 0 12px 24px rgba(37,99,235,.12); }
    .item i { font-size: 2rem; color: var(--blue); width: 42px; text-align:center; }
    .item h3 { color: var(--blue); font-size: 1.2rem; margin-bottom: 4px; }
    .item p { color: var(--navy); opacity:.6; font-size: .78rem; text-transform: uppercase; letter-spacing: 1px; }
    .exit-btn {
      position: fixed; top: 36px; right: 36px; width: 50px; height: 50px; border-radius: 50%; background:#fff; color:var(--blue); display:flex; align-items:center; justify-content:center; text-decoration:none; box-shadow: 0 10px 20px rgba(0,0,0,.1); transition:.25s;
    }
    .exit-btn:hover { background: var(--blue); color:#fff; transform: rotate(90deg); }
    .footer { text-align:center; margin-top: 42px; color: var(--blue); opacity:.65; letter-spacing: 4px; font-size:.78rem; }
  </style>
</head>
<body>
  <div class="wave"></div>
  <div class="wave two"></div>
  <a href="http://127.0.0.1:5011" class="exit-btn" title="安全退出"><i class="fas fa-power-off"></i></a>
  <div class="card">
    <div class="title">
      <h1>管理中枢</h1>
      <div class="status"><div class="dot"></div><span>SYSTEM OPERATIONAL</span><span>|</span><span>SECURE CONTROL PANEL</span></div>
    </div>
    <div class="grid">
      <a href="http://127.0.0.1:5008" class="item"><i class="fas fa-chart-line"></i><div><h3>大屏可视化</h3><p>Data Analytics</p></div></a>
      <a href="http://127.0.0.1:5009" class="item"><i class="fas fa-user-shield"></i><div><h3>用户信息查询</h3><p>User Directory</p></div></a>
      <a href="http://127.0.0.1:5010" class="item"><i class="fas fa-file-contract"></i><div><h3>合同信息查询</h3><p>Contract Archive</p></div></a>
      <a href="http://127.0.0.1:8003/model" class="item"><i class="fas fa-cubes"></i><div><h3>模板管理</h3><p>Template Console</p></div></a>
    </div>
    <div class="footer">2026 COMMAND INTERFACE</div>
  </div>
</body>
</html>
